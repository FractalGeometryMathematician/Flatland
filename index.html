<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flatland Fog</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #eee;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }
  #label {
    position: fixed;
    top: 20px;
    left: 25px;
    color: rgba(0,0,0,0.65);
    font-size: 18px;
    letter-spacing: 1px;
  }
  #hint {
    position: fixed;
    bottom: 25px;
    left: 30px;
    color: rgba(0,0,0,0.45);
    font-size: 16px;
  }
</style>
</head>

<body>
<div id="label">FLATLAND FOG — horizontal side profile</div>
<div id="hint">Press SPACE for next hidden shape</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let state = "idle"; 
let currentShapeIndex = -1;
let polygon = [];
let lastPolygon = [];
let lastShapeName = "";

let shapeY = -230;
let approachProgress = 0;
let holdTimer = 0;
let fadeAlpha = 1;

let revealAlpha = 0;
let revealScale = 0;

const sensorY = 0;
const speed = 0.006;
const HOLD_FRAMES = 120;

function cx() { return canvas.width / 2; }
function cy() { return canvas.height / 2; }

function regularPolygon(sides, radius, rotation = -Math.PI / 2) {
  const pts = [];
  for (let i = 0; i < sides; i++) {
    const a = rotation + i * Math.PI * 2 / sides;
    pts.push({ x: Math.cos(a) * radius, y: Math.sin(a) * radius });
  }
  return pts;
}

const shapes = [
  {
    name: "Square",
    points: [
      { x: -150, y: -150 },
      { x:  150, y: -150 },
      { x:  150, y:  150 },
      { x: -150, y:  150 }
    ]
  },
  {
    name: "Triangle",
    points: [
      { x: 0, y: -180 },
      { x: 165, y: 140 },
      { x: -165, y: 140 }
    ]
  },
  { name: "Pentagon", points: regularPolygon(5, 170) },
  { name: "Hexagon", points: regularPolygon(6, 165) },
  { name: "Circle", points: regularPolygon(96, 165) },
  {
    name: "Diamond",
    points: [
      { x: 0, y: -185 },
      { x: 185, y: 0 },
      { x: 0, y: 185 },
      { x: -185, y: 0 }
    ]
  }
];

function startNextShape() {
  currentShapeIndex = Math.floor(Math.random() * shapes.length);

  polygon = shapes[currentShapeIndex].points;
  lastPolygon = polygon;
  lastShapeName = shapes[currentShapeIndex].name;

  shapeY = -230;
  approachProgress = 0;
  holdTimer = 0;
  fadeAlpha = 1;

  revealAlpha = 0;
  revealScale = 0;

  state = "approach";
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();
    startNextShape();
  }
});

function getHorizontalSlice() {
  const hits = [];

  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];

    const ay = a.y + shapeY;
    const by = b.y + shapeY;

    if ((ay <= sensorY && by >= sensorY) || (ay >= sensorY && by <= sensorY)) {
      if (ay === by) continue;

      const t = (sensorY - ay) / (by - ay);
      const x = a.x + (b.x - a.x) * t;
      hits.push(x);
    }
  }

  if (hits.length >= 2) {
    hits.sort((a, b) => a - b);
    return {
      left: hits[0],
      right: hits[hits.length - 1]
    };
  }

  return null;
}

function drawMist() {
  const g = ctx.createLinearGradient(0, 0, canvas.width, 0);
  g.addColorStop(0, "#f8f8f4");
  g.addColorStop(0.5, "#e7e7e2");
  g.addColorStop(1, "#f8f8f4");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 45; i++) {
    const size = 50 + Math.random() * 120;
    const alpha = Math.random() * 0.018;

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      size,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

function drawSlice(slice) {
  if (!slice) return;

  const x1 = cx() + slice.left;
  const x2 = cx() + slice.right;
  const y = cy();

  const darkness = approachProgress * fadeAlpha;
  const alpha = 0.08 + darkness * 0.80;

  const grad = ctx.createLinearGradient(x1, 0, x2, 0);

  grad.addColorStop(0.00, `rgba(0,0,0,0)`);
  grad.addColorStop(0.16, `rgba(0,0,0,${alpha * 0.25})`);
  grad.addColorStop(0.34, `rgba(0,0,0,${alpha * 0.65})`);
  grad.addColorStop(0.50, `rgba(0,0,0,${alpha})`);
  grad.addColorStop(0.66, `rgba(0,0,0,${alpha * 0.65})`);
  grad.addColorStop(0.84, `rgba(0,0,0,${alpha * 0.25})`);
  grad.addColorStop(1.00, `rgba(0,0,0,0)`);

  ctx.shadowBlur = 30 * darkness;
  ctx.shadowColor = `rgba(0,0,0,${0.35 * darkness})`;

  ctx.strokeStyle = grad;
  ctx.lineWidth = 12 + 10 * approachProgress;

  ctx.beginPath();
  ctx.moveTo(x1, y);
  ctx.lineTo(x2, y);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function drawReveal() {
  if (state !== "reveal") return;

  revealAlpha += (1 - revealAlpha) * 0.05;
  revealScale += (1 - revealScale) * 0.06;

  const x = canvas.width - 180;
  const y = canvas.height - 170;
  const scale = 0.42 * revealScale;

  ctx.save();
  ctx.translate(x, y);

  ctx.fillStyle = `rgba(0,0,0,${0.72 * revealAlpha})`;
  ctx.strokeStyle = `rgba(0,0,0,${0.35 * revealAlpha})`;
  ctx.lineWidth = 3;

  ctx.beginPath();
  for (let i = 0; i < lastPolygon.length; i++) {
    const p = lastPolygon[i];
    if (i === 0) ctx.moveTo(p.x * scale, p.y * scale);
    else ctx.lineTo(p.x * scale, p.y * scale);
  }

  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  ctx.restore();

  ctx.fillStyle = `rgba(0,0,0,${0.65 * revealAlpha})`;
  ctx.font = "18px Arial";
  ctx.textAlign = "center";
  ctx.fillText(lastShapeName, x, y + 115);
}

function draw() {
  drawMist();

  ctx.strokeStyle = "rgba(0,0,0,0.12)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, cy());
  ctx.lineTo(canvas.width, cy());
  ctx.stroke();

  if (state === "approach") {
    approachProgress += speed;

    if (approachProgress >= 1) {
      approachProgress = 1;
      state = "hold";
      holdTimer = HOLD_FRAMES;
    }

    shapeY = -230 + approachProgress * 230;

    const slice = getHorizontalSlice();
    drawSlice(slice);
  }

  else if (state === "hold") {
    const slice = getHorizontalSlice();
    drawSlice(slice);

    holdTimer--;

    if (holdTimer <= 0) {
      state = "fade";
    }
  }

  else if (state === "fade") {
    fadeAlpha *= 0.94;

    const slice = getHorizontalSlice();
    drawSlice(slice);

    if (fadeAlpha < 0.03) {
      state = "reveal";
    }
  }

  drawReveal();

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
