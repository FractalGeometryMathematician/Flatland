<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flatland Fog</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #eee;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(0,0,0,0.65);
    font-size: 18px;
    letter-spacing: 1px;
  }

  #hint {
    position: fixed;
    bottom: 25px;
    left: 25px;
    color: rgba(0,0,0,0.45);
    font-size: 16px;
  }
</style>
</head>

<body>
<div id="label">FLATLAND FOG — horizontal side profile</div>
<div id="hint">Press SPACE for next hidden shape</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}

resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let active = false;
let currentShapeIndex = -1;
let polygon = [];

let shapeY = -230;
let speed = 2.0;

const sensorY = 0;

function cx() {
  return canvas.width / 2;
}

function cy() {
  return canvas.height / 2;
}

function regularPolygon(sides, radius, rotation = -Math.PI / 2) {
  const pts = [];

  for (let i = 0; i < sides; i++) {
    const a = rotation + i * Math.PI * 2 / sides;
    pts.push({
      x: Math.cos(a) * radius,
      y: Math.sin(a) * radius
    });
  }

  return pts;
}

const shapes = [
  {
    name: "Square",
    points: [
      { x: -150, y: -150 },
      { x:  150, y: -150 },
      { x:  150, y:  150 },
      { x: -150, y:  150 }
    ]
  },
  {
    name: "Triangle",
    points: [
      { x: 0, y: -180 },
      { x: 165, y: 140 },
      { x: -165, y: 140 }
    ]
  },
  {
    name: "Pentagon",
    points: regularPolygon(5, 170)
  },
  {
    name: "Hexagon",
    points: regularPolygon(6, 165)
  },
  {
    name: "Circle",
    points: regularPolygon(96, 165)
  },
  {
    name: "Diamond",
    points: [
      { x: 0, y: -185 },
      { x: 185, y: 0 },
      { x: 0, y: 185 },
      { x: -185, y: 0 }
    ]
  }
];

function startNextShape() {
  currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
  polygon = shapes[currentShapeIndex].points;

  shapeY = -230;
  active = true;
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();
    startNextShape();
  }
});

function getHorizontalSlice() {
  const hits = [];

  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];

    const ay = a.y + shapeY;
    const by = b.y + shapeY;

    if ((ay <= sensorY && by >= sensorY) || (ay >= sensorY && by <= sensorY)) {
      if (ay === by) continue;

      const t = (sensorY - ay) / (by - ay);
      const x = a.x + (b.x - a.x) * t;

      hits.push(x);
    }
  }

  if (hits.length >= 2) {
    hits.sort((a, b) => a - b);

    return {
      left: hits[0],
      right: hits[hits.length - 1]
    };
  }

  return null;
}

function drawMist() {
  const g = ctx.createLinearGradient(0, 0, canvas.width, 0);
  g.addColorStop(0, "#f8f8f4");
  g.addColorStop(0.5, "#e7e7e2");
  g.addColorStop(1, "#f8f8f4");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 220; i++) {
    const size = 30 + Math.random() * 100;
    const alpha = Math.random() * 0.04;

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;

    ctx.beginPath();
    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      size,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

function drawSlice(slice) {
  if (!slice) return;

  const x1 = cx() + slice.left;
  const x2 = cx() + slice.right;
  const y = cy();

  const progress = Math.min(1, Math.max(0, (shapeY + 230) / 420));
  const alpha = 0.15 + progress * 0.75;

  ctx.shadowBlur = 35;
  ctx.shadowColor = `rgba(0,0,0,${alpha * 0.4})`;

  ctx.strokeStyle = `rgba(0,0,0,${alpha})`;
  ctx.lineWidth = 18;

  ctx.beginPath();
  ctx.moveTo(x1, y);
  ctx.lineTo(x2, y);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function draw() {
  drawMist();

  ctx.strokeStyle = "rgba(0,0,0,0.14)";
  ctx.lineWidth = 1;

  ctx.beginPath();
  ctx.moveTo(0, cy());
  ctx.lineTo(canvas.width, cy());
  ctx.stroke();

  if (active) {
    const slice = getHorizontalSlice();
    drawSlice(slice);

    shapeY += speed;

    if (shapeY > 230) {
      active = false;
    }
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
