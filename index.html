<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Flatland Fog</title>

<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: black;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(255,255,255,0.8);
    font-size: 18px;
    letter-spacing: 1px;
  }

  #hint {
    position: fixed;
    bottom: 25px;
    left: 25px;
    color: rgba(255,255,255,0.55);
    font-size: 16px;
  }
</style>
</head>

<body>
<div id="label">FLATLAND FOG — cross-section perception</div>
<div id="hint">Press SPACE for the next hidden shape</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let active = false;
let shapeY = -520;
let currentShapeIndex = -1;
let polygon = [];

let visibleWidth = 0;
let visibleAlpha = 0;

const speed = 2.3;
const startY = -520;
const stopY = 260;

function centerX() {
  return canvas.width / 2;
}

function centerY() {
  return canvas.height / 2;
}

function regularPolygon(sides, radius, rotation = -Math.PI / 2) {
  const pts = [];

  for (let i = 0; i < sides; i++) {
    const angle = rotation + i * Math.PI * 2 / sides;

    pts.push({
      x: Math.cos(angle) * radius,
      y: Math.sin(angle) * radius
    });
  }

  return pts;
}

const shapes = [
  {
    name: "Square",
    points: [
      { x: -130, y: -130 },
      { x:  130, y: -130 },
      { x:  130, y:  130 },
      { x: -130, y:  130 }
    ]
  },
  {
    name: "Triangle",
    points: [
      { x: 0, y: -170 },
      { x: 150, y: 130 },
      { x: -150, y: 130 }
    ]
  },
  {
    name: "Pentagon",
    points: regularPolygon(5, 160)
  },
  {
    name: "Hexagon",
    points: regularPolygon(6, 155)
  },
  {
    name: "Circle",
    points: regularPolygon(80, 155)
  },
  {
    name: "Diamond",
    points: [
      { x: 0, y: -170 },
      { x: 150, y: 0 },
      { x: 0, y: 170 },
      { x: -150, y: 0 }
    ]
  }
];

function startNextShape() {
  currentShapeIndex = (currentShapeIndex + 1) % shapes.length;

  polygon = shapes[currentShapeIndex].points;
  shapeY = startY;

  visibleWidth = 0;
  visibleAlpha = 0;

  active = true;
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();
    startNextShape();
  }
});

function getSliceWidth() {
  const intersections = [];

  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];

    const ay = a.y + shapeY;
    const by = b.y + shapeY;

    if ((ay <= 0 && by >= 0) || (ay >= 0 && by <= 0)) {
      if (ay === by) continue;

      const t = (0 - ay) / (by - ay);
      const x = a.x + (b.x - a.x) * t;

      intersections.push(x);
    }
  }

  if (intersections.length >= 2) {
    intersections.sort((a, b) => a - b);
    return intersections[intersections.length - 1] - intersections[0];
  }

  return 0;
}

function drawFog() {
  for (let i = 0; i < 140; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.025})`;
    ctx.fillRect(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      2,
      2
    );
  }
}

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function drawPerceptionLine(width, alpha) {
  if (width <= 1 || alpha <= 0.01) return;

  const y = canvas.height - 130;
  const x1 = centerX() - width / 2;
  const x2 = centerX() + width / 2;

  ctx.shadowBlur = 30 * alpha;
  ctx.shadowColor = `rgba(255,255,255,${alpha})`;

  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth = 10;

  ctx.beginPath();
  ctx.moveTo(x1, y);
  ctx.lineTo(x2, y);
  ctx.stroke();

  ctx.shadowBlur = 0;
}

function draw() {
  ctx.fillStyle = "black";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  drawFog();

  ctx.strokeStyle = "rgba(255,255,255,0.15)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, centerY());
  ctx.lineTo(canvas.width, centerY());
  ctx.stroke();

  ctx.fillStyle = "rgba(255,255,255,0.7)";
  ctx.beginPath();
  ctx.arc(centerX(), centerY(), 3, 0, Math.PI * 2);
  ctx.fill();

  let targetWidth = 0;
  let targetAlpha = 0;

  if (active) {
    targetWidth = getSliceWidth();

    const closeness = Math.min(1, Math.max(0, (shapeY - startY) / (stopY - startY)));
    targetAlpha = targetWidth > 0 ? closeness : 0;

    shapeY += speed;

    if (shapeY > stopY) {
      active = false;
    }
  }

  visibleWidth = lerp(visibleWidth, targetWidth, 0.08);
  visibleAlpha = lerp(visibleAlpha, targetAlpha, 0.05);

  drawPerceptionLine(visibleWidth, visibleAlpha);

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
