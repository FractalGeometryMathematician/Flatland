<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flatland Fog</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: white;
    font-family: Arial, sans-serif;
  }

  canvas {
    display: block;
  }

  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(0,0,0,0.65);
    font-size: 18px;
    letter-spacing: 1px;
  }

  #hint {
    position: fixed;
    bottom: 25px;
    left: 25px;
    color: rgba(0,0,0,0.45);
    font-size: 16px;
  }
</style>
</head>

<body>
<div id="label">FLATLAND FOG — shape emerging through mist</div>
<div id="hint">Press SPACE for next shape</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let active = false;
let currentShapeIndex = -1;
let polygon = [];

let distance = 0;
let targetDistance = 0;

const speed = 0.012;

function centerX() {
  return canvas.width / 2;
}

function centerY() {
  return canvas.height / 2;
}

function regularPolygon(sides, radius, rotation = -Math.PI / 2) {
  const pts = [];

  for (let i = 0; i < sides; i++) {
    const angle = rotation + i * Math.PI * 2 / sides;
    pts.push({
      x: Math.cos(angle) * radius,
      y: Math.sin(angle) * radius
    });
  }

  return pts;
}

const shapes = [
  {
    name: "Square",
    points: [
      { x: -140, y: -140 },
      { x:  140, y: -140 },
      { x:  140, y:  140 },
      { x: -140, y:  140 }
    ]
  },
  {
    name: "Triangle",
    points: [
      { x: 0, y: -180 },
      { x: 160, y: 140 },
      { x: -160, y: 140 }
    ]
  },
  {
    name: "Pentagon",
    points: regularPolygon(5, 170)
  },
  {
    name: "Hexagon",
    points: regularPolygon(6, 165)
  },
  {
    name: "Circle",
    points: regularPolygon(80, 165)
  },
  {
    name: "Diamond",
    points: [
      { x: 0, y: -185 },
      { x: 165, y: 0 },
      { x: 0, y: 185 },
      { x: -165, y: 0 }
    ]
  }
];

function startNextShape() {
  currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
  polygon = shapes[currentShapeIndex].points;

  distance = 0;
  targetDistance = 1;
  active = true;
}

document.addEventListener("keydown", function(e) {
  if (e.code === "Space") {
    e.preventDefault();
    startNextShape();
  }
});

function lerp(a, b, t) {
  return a + (b - a) * t;
}

function drawMistBackground() {
  const grad = ctx.createRadialGradient(
    centerX(), centerY(), 50,
    centerX(), centerY(), canvas.width * 0.7
  );

  grad.addColorStop(0, "rgb(245,245,242)");
  grad.addColorStop(1, "rgb(210,213,210)");

  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 260; i++) {
    const size = 20 + Math.random() * 90;
    const alpha = Math.random() * 0.055;

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      size,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

function makeShapePath(scale) {
  ctx.beginPath();

  for (let i = 0; i < polygon.length; i++) {
    const p = polygon[i];

    const x = centerX() + p.x * scale;
    const y = centerY() + p.y * scale;

    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }

  ctx.closePath();
}

function drawEmergingShape() {
  if (!active && distance < 0.01) return;

  const scale = lerp(0.15, 1.25, distance);
  const darkness = lerp(0.03, 0.92, distance);

  ctx.save();

  makeShapePath(scale);

  ctx.shadowBlur = 60 * (1 - distance);
  ctx.shadowColor = "rgba(255,255,255,0.9)";

  ctx.fillStyle = `rgba(0,0,0,${darkness})`;
  ctx.fill();

  ctx.clip();

  // Fog inside the shape: far side remains cloudy, near side clears.
  const fogGradient = ctx.createLinearGradient(
    centerX() - 220 * scale,
    centerY() - 220 * scale,
    centerX() + 220 * scale,
    centerY() + 220 * scale
  );

  fogGradient.addColorStop(0.00, `rgba(255,255,255,${0.85 * (1 - distance)})`);
  fogGradient.addColorStop(0.45, `rgba(255,255,255,${0.45 * (1 - distance)})`);
  fogGradient.addColorStop(1.00, `rgba(255,255,255,${0.08 * (1 - distance)})`);

  ctx.fillStyle = fogGradient;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Cloud patches over different parts of the shape.
  for (let i = 0; i < 45; i++) {
    const px = centerX() + (Math.random() - 0.5) * 380 * scale;
    const py = centerY() + (Math.random() - 0.5) * 380 * scale;
    const size = 15 + Math.random() * 55;
    const alpha = Math.random() * 0.13 * (1 - distance);

    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(px, py, size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();

  // Darker edge as it gets closer.
  ctx.save();
  makeShapePath(scale);
  ctx.strokeStyle = `rgba(0,0,0,${0.45 * distance})`;
  ctx.lineWidth = 3;
  ctx.stroke();
  ctx.restore();
}

function draw() {
  drawMistBackground();

  distance = lerp(distance, targetDistance, speed);

  drawEmergingShape();

  if (distance > 0.985) {
    targetDistance = 0;
    active = false;
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
