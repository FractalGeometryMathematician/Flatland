<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Flatland Fog</title>
<style>
  html, body {
    margin: 0;
    overflow: hidden;
    background: #eee;
    font-family: Arial, sans-serif;
  }
  canvas { display: block; }
  #label {
    position: fixed;
    top: 20px;
    left: 20px;
    color: rgba(0,0,0,0.65);
    font-size: 18px;
    letter-spacing: 1px;
  }
  #hint {
    position: fixed;
    bottom: 25px;
    left: 25px;
    color: rgba(0,0,0,0.45);
    font-size: 16px;
  }
</style>
</head>

<body>
<div id="label">FLATLAND FOG — side-view cross-section</div>
<div id="hint">Press SPACE for next hidden shape</div>
<canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

function resizeCanvas() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize", resizeCanvas);

let active = false;
let currentShapeIndex = -1;
let polygon = [];

let shapeX = -420;
let speed = 2.2;

const sensorX = 0;

function cx() { return canvas.width / 2; }
function cy() { return canvas.height / 2; }

function regularPolygon(sides, radius, rotation = -Math.PI / 2) {
  const pts = [];
  for (let i = 0; i < sides; i++) {
    const a = rotation + i * Math.PI * 2 / sides;
    pts.push({ x: Math.cos(a) * radius, y: Math.sin(a) * radius });
  }
  return pts;
}

const shapes = [
  {
    name: "Square",
    points: [
      { x: -150, y: -150 },
      { x:  150, y: -150 },
      { x:  150, y:  150 },
      { x: -150, y:  150 }
    ]
  },
  {
    name: "Triangle",
    points: [
      { x: -160, y: 150 },
      { x: 160, y: 0 },
      { x: -160, y: -150 }
    ]
  },
  { name: "Pentagon", points: regularPolygon(5, 170) },
  { name: "Hexagon", points: regularPolygon(6, 165) },
  { name: "Circle", points: regularPolygon(96, 165) },
  {
    name: "Diamond",
    points: [
      { x: 0, y: -180 },
      { x: 180, y: 0 },
      { x: 0, y: 180 },
      { x: -180, y: 0 }
    ]
  }
];

function startNextShape() {
  currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
  polygon = shapes[currentShapeIndex].points;
  shapeX = -420;
  active = true;
}

document.addEventListener("keydown", e => {
  if (e.code === "Space") {
    e.preventDefault();
    startNextShape();
  }
});

function getVerticalSlice() {
  const hits = [];

  for (let i = 0; i < polygon.length; i++) {
    const a = polygon[i];
    const b = polygon[(i + 1) % polygon.length];

    const ax = a.x + shapeX;
    const bx = b.x + shapeX;

    if ((ax <= sensorX && bx >= sensorX) || (ax >= sensorX && bx <= sensorX)) {
      if (ax === bx) continue;

      const t = (sensorX - ax) / (bx - ax);
      const y = a.y + (b.y - a.y) * t;
      hits.push(y);
    }
  }

  if (hits.length >= 2) {
    hits.sort((a, b) => a - b);
    return {
      top: hits[0],
      bottom: hits[hits.length - 1],
      height: hits[hits.length - 1] - hits[0]
    };
  }

  return null;
}

function drawMist() {
  const g = ctx.createLinearGradient(0, 0, canvas.width, 0);
  g.addColorStop(0, "#f8f8f4");
  g.addColorStop(0.5, "#e7e7e2");
  g.addColorStop(1, "#f8f8f4");

  ctx.fillStyle = g;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let i = 0; i < 250; i++) {
    const size = 30 + Math.random() * 100;
    const alpha = Math.random() * 0.045;
    ctx.fillStyle = `rgba(255,255,255,${alpha})`;
    ctx.beginPath();
    ctx.arc(Math.random() * canvas.width, Math.random() * canvas.height, size, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawSlice(slice) {
  if (!slice) return;

  const y1 = cy() + slice.top;
  const y2 = cy() + slice.bottom;

  const progress = Math.min(1, Math.max(0, (shapeX + 420) / 520));
  const alpha = 0.15 + progress * 0.75;

  const x = cx();

  ctx.shadowBlur = 35;
  ctx.shadowColor = `rgba(0,0,0,${alpha * 0.35})`;

  const grad = ctx.createLinearGradient(x - 18, y1, x + 18, y2);
  grad.addColorStop(0, `rgba(255,255,255,${0.45 * (1 - progress)})`);
  grad.addColorStop(0.35, `rgba(0,0,0,${alpha})`);
  grad.addColorStop(0.65, `rgba(0,0,0,${alpha})`);
  grad.addColorStop(1, `rgba(255,255,255,${0.35 * (1 - progress)})`);

  ctx.strokeStyle = grad;
  ctx.lineWidth = 18;

  ctx.beginPath();
  ctx.moveTo(x, y1);
  ctx.lineTo(x, y2);
  ctx.stroke();

  ctx.shadowBlur = 0;

  // mist veil directly over the slice
  for (let i = 0; i < 18; i++) {
    ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.12 * (1 - progress)})`;
    ctx.beginPath();
    ctx.arc(
      x + (Math.random() - 0.5) * 60,
      y1 + Math.random() * (y2 - y1),
      8 + Math.random() * 30,
      0,
      Math.PI * 2
    );
    ctx.fill();
  }
}

function draw() {
  drawMist();

  ctx.strokeStyle = "rgba(0,0,0,0.12)";
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx(), 0);
  ctx.lineTo(cx(), canvas.height);
  ctx.stroke();

  if (active) {
    const slice = getVerticalSlice();
    drawSlice(slice);

    shapeX += speed;

    if (shapeX > 260) active = false;
  }

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
